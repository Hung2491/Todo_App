services:

  frontend:
    build:
      context: ./FE-Todo
      args:
        - VITE_API_URL=http://xor-app.site/tasks
    image: ${DOCKERHUB_USERNAME}/todo-app-frontend:latest
    container_name: todo-app-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/todo.conf.template:/etc/nginx/templates/todo.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /var/log/nginx:/var/log/nginx
    environment:
      - PARTNER_IP=${PARTNER_IP}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - todo-network

  backend:
    image: ${DOCKERHUB_USERNAME}/todo-app-backend:latest
    container_name: be-todo
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://admin:${MONGO_PASSWORD}@${VM3_PRIVATE_IP}:27017,${VM4_PRIVATE_IP}:27017/ts-crud?replicaSet=rs0&authSource=admin
    restart: always
    networks:
      - todo-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    networks:
      - todo-network
      
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - todo-network
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - todo-network
    restart: always

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: always
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - todo-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
