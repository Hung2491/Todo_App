services:
  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./FE-Todo
      args:
        # Giấu IP của server để không lộ sơ đồ mạng trên Git
        - VITE_API_URL=http://${SERVER_PRIVATE_IP}:8000/
      dockerfile: Dockerfile
    image: todo-app-frontend:latest
    container_name: todo-app-frontend
    restart: always
    ports:
      - "3002:3002"
    volumes:
      - ./nginx/todo.conf:/etc/nginx/conf.d/todo.conf:ro
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://${SERVER_PRIVATE_IP}:3002/ > /dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - todo-network

  # ── Backend ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./BE-Todo
      dockerfile: Dockerfile
    image: todo-app-backend:latest
    container_name: be-todo
    ports:
      - "8000:8000"
    env_file:
      - ./BE-Todo/.env
    depends_on:
      - mongodb
    environment:
      # Giấu tên DB hoặc chuỗi kết nối nhạy cảm
      - MONGO_URI=mongodb://mongodb:27017/${DB_NAME}
    restart: always
    networks:
      - todo-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://${SERVER_PRIVATE_IP}:8000/ > /dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MongoDB ─────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:latest
    container_name: todo-mongodb
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    restart: always
    networks:
      - todo-network

  # ── Các service Monitoring (Port giữ nguyên cho dễ quản lý) ──────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - todo-network
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - todo-network
    restart: always

  # ... (Các service khác như node-exporter, cadvisor giữ nguyên port như file cũ của ông)

networks:
  todo-network:
    driver: bridge

volumes:
  mongo_data:
  prometheus_data:
  grafana_data:
