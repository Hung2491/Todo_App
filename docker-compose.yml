services:

  frontend:
    image: ${DOCKERHUB_USERNAME}/todo-app-frontend:latest
    build:
      context: ./FE-Todo
      dockerfile: Dockerfile
    container_name: todo-app-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/todo.conf.template:/etc/nginx/templates/todo.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /var/log/nginx:/var/log/nginx
    environment:
      - VM2_PRIVATE_IP=${VM2_PRIVATE_IP}
      - VM3_PRIVATE_IP=${VM3_PRIVATE_IP}
      - VM_PUBLIC_IP=${VM_PUBLIC_IP}
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- --no-check-certificate https://localhost/health > /dev/null || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - todo-networks

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    networks:
      - todo-networks
    restart: always

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: always
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - todo-networks

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    # Port 3000 không expose ra host - truy cập qua nginx reverse proxy
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - todo-networks
    restart: always

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    command:
      - '--docker_only=true'
      - '--housekeeping_interval=10s'
      - '--allow_dynamic_housekeeping=true'
    networks:
      - todo-networks

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - todo-networks

networks:
  todo-networks:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
