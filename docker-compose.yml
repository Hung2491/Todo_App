services:

  frontend:
    image: ${DOCKERHUB_USERNAME}/todo-app-frontend:${FRONTEND_TAG}
    build:
      context: ./FE-Todo
      dockerfile: Dockerfile
    container_name: todo-app-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/todo.conf.template:/etc/nginx/templates/todo.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /var/log/nginx:/var/log/nginx
    environment:
      - VM2_PRIVATE_IP=${VM2_PRIVATE_IP}
      - VM3_PRIVATE_IP=${VM3_PRIVATE_IP}
      - VM_PUBLIC_IP=${VM_PUBLIC_IP}
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- --no-check-certificate https://localhost/health > /dev/null || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - todo-networks

  prometheus:
    image: ${DOCKERHUB_USERNAME}/todo-app-prometheus:${MONITORING_TAG}
    container_name: prometheus
    volumes:
      - prometheus_data:/prometheus
    ports:
      - "${BIND_IP}:9090:9090"
    networks:
      - todo-networks
    restart: always

  alertmanager:
    image: ${DOCKERHUB_USERNAME}/todo-app-alertmanager:${MONITORING_TAG}
    container_name: alertmanager
    restart: always
    networks:
      - todo-networks

  grafana:
    image: ${DOCKERHUB_USERNAME}/todo-app-grafana:${MONITORING_TAG}
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "${BIND_IP}:3000:3000"
    networks:
      - todo-networks
    restart: always

  cadvisor:
    image: ${DOCKERHUB_USERNAME}/todo-app-cadvisor:${MONITORING_TAG}
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    command:
      - '--docker_only=true'
      - '--housekeeping_interval=10s'
      - '--allow_dynamic_housekeeping=true'
      - '--port=8081'
    ports:
      - "${BIND_IP}:8081:8081"
    networks:
      - todo-networks

  node-exporter:
    image: ${DOCKERHUB_USERNAME}/todo-app-node-exporter:${MONITORING_TAG}
    container_name: node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "${BIND_IP}:9100:9100"
    networks:
      - todo-networks

networks:
  todo-networks:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16
          gateway: 172.18.0.1

volumes:
  prometheus_data:
  grafana_data:
