services:
  # ── Frontend (Nginx serve React/Vite build) ─────────────────────────────
  frontend:
    build:
      context: ./FE-Todo
      args:
        - VITE_API_URL=http://103.252.73.200:8000/
      dockerfile: Dockerfile
    image: todo-app-frontend:latest
    container_name: todo-app-frontend
    restart: always
    ports:
      - "3002:3002"
    volumes:
      - ./nginx/todo.conf:/etc/nginx/conf.d/todo.conf:ro
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://103.252.73.200:3002/ > /dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - todo-network

  # ── Backend (Node.js) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./BE-Todo
      dockerfile: Dockerfile
    image: todo-app-backend:latest
    container_name: be-todo
    ports:
      - "8000:8000"
    env_file:
      - ./BE-Todo/.env
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ts-crud
    restart: always
    networks:
      - todo-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://103.252.73.200:8000/ > /dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MongoDB ─────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:latest
    container_name: todo-mongodb
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    restart: always
    networks:
      - todo-network

  # ── Alertmanager ────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    networks:
      - todo-network
    restart: always

  # ── Prometheus ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - todo-network
    restart: always

  # ── Node Exporter ───────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
    networks:
      - todo-network
    restart: always

  # ── cAdvisor ────────────────────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - todo-network
    restart: always

  # ── Grafana ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - todo-network
    restart: always

# ── Network ───────────────────────────────────────────────────────────────
networks:
  todo-network:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  mongo_data:
  prometheus_data:
  grafana_data:
