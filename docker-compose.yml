# VM1: nginx load balancer + frontend + monitoring stack
services:

  frontend:
    build:
      context: ./FE-Todo
      args:
        - VITE_API_URL=http://${SERVER_PRIVATE_IP}:8000/
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME}/todo-app-frontend:latest
    container_name: todo-app-frontend
    restart: always
    ports:
      - "3002:3002"
    volumes:
      - ./nginx/todo.conf.template:/etc/nginx/templates/todo.conf.template:ro
    environment:
      - SERVER_PRIVATE_IP=${SERVER_PRIVATE_IP}
      - VM2_PRIVATE_IP=${VM2_PRIVATE_IP}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - todo-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - todo-network
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - todo-network
    restart: always

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: always
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"   # expose để prometheus scrape
    networks:
      - todo-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"   # expose để prometheus scrape
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
