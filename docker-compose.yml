services:

  frontend:
    build:
      context: ./FE-Todo
    image: ${DOCKERHUB_USERNAME}/todo-app-frontend:latest
    container_name: todo-app-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/todo.conf.template:/etc/nginx/templates/todo.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /var/log/nginx:/var/log/nginx
    environment:
      - VM2_PRIVATE_IP=${VM2_PRIVATE_IP}
      - VM3_PRIVATE_IP=${VM3_PRIVATE_IP}
      - VM_PUBLIC_IP=${VM_PUBLIC_IP}
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost/health > /dev/null || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - todo-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    networks:
      - todo-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: always
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - todo-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - todo-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    command:
      - '--docker_only=true'
      - '--housekeeping_interval=10s'
      - '--allow_dynamic_housekeeping=true'
    ports:
      - "8081:8080"
    networks:
      - todo-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
