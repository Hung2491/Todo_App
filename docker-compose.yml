services:

  frontend:
    image: ${DOCKERHUB_USERNAME}/todo-app-frontend:latest
    container_name: todo-app-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/todo.conf.template:/etc/nginx/templates/todo.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /var/log/nginx:/var/log/nginx
    environment:
      - VM2_PRIVATE_IP=${VM2_PRIVATE_IP}
      - VM3_PRIVATE_IP=${VM3_PRIVATE_IP}
      - VM_PUBLIC_IP=${VM_PUBLIC_IP}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - todo-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml   # fix: tên file đồng nhất
      - prometheus_data:/prometheus
    # Chỉ expose nội bộ, không ra ngoài internet
    ports:
      - "9090:9090"
    networks:
      - todo-network
    restart: always

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: always
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    # Chỉ expose nội bộ
    ports:
      - "9093:9093"
    networks:
      - todo-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    # Chỉ bind localhost, không expose ra 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - todo-network
    restart: always

  cadvisor:
  image: gcr.io/cadvisor/cadvisor:v0.49.1
  container_name: cadvisor
  restart: always
  privileged: true
  devices:
    - /dev/kmsg
  volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:rw
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro
    - /dev/disk/:/dev/disk:ro
  command:
    - '--docker_only=true'          
    - '--store_container_labels=false'
    - '--disable_metrics=advtcp,cpuLoad,cpu_topology,disk,diskIO,hugetlb,memory_numa,percpu,perf_event,process,referenced_memory,resctrl,sched,tcp,udp'
  ports:
    - "8080:8080"
  networks:
    - todo-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    # Chỉ expose nội bộ
    ports:
      - "9100:9100"
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
