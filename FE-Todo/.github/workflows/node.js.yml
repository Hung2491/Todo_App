name: Node.js Docker CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Build Docker Image (Stage này thay thế cho npm install/build trên Actions)
      - name: Build Docker Image
        run: docker build -t todo-app-frontend:latest .

      # 2. Lưu Image thành file để chuyển lên Server (Nếu chưa dùng Docker Registry)
      - name: Save Docker Image
        run: docker save todo-app-frontend:latest > todo-app.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: todo-app.tar
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      # 3. Copy file Image và file Config (todo.conf, docker-compose.yml) lên VPS
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          # Copy cả file Image và file cấu hình để vận hành
          source: "todo-app.tar,todo.conf,docker-compose.yml"
          target: "~/project/Todo-App"

      # 4. SSH vào Server để thực thi Docker
      - name: Docker Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/project/Todo-App
            # Load image từ file tar
            docker load < todo-app.tar
            # Khởi chạy bằng Compose để đảm bảo restart:always và đúng cổng 3002
            docker compose up -d
            # Dọn dẹp các image cũ để tiết kiệm ổ cứng (Mục 2.2 - Cảnh báo tài nguyên)
            docker image prune -f
