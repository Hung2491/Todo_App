global:
  scrape_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - 'localhost:9093'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # VM1 - Load Balancer
  - job_name: 'node-exporter-vm1'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          vm: 'vm1'
          role: 'loadbalancer'

  - job_name: 'cadvisor-vm1'
    static_configs:
      - targets: ['localhost:8080']
        labels:
          vm: 'vm1'
          role: 'loadbalancer'

  # VM2 - Backend
  - job_name: 'node-exporter-vm2'
    static_configs:
      - targets: ['${VM2_PRIVATE_IP}:9100']
        labels:
          vm: 'vm2'
          role: 'backend'

  - job_name: 'cadvisor-vm2'
    static_configs:
      - targets: ['${VM2_PRIVATE_IP}:8080']
        labels:
          vm: 'vm2'
          role: 'backend'

  - job_name: 'backend-vm2'
    static_configs:
      - targets: ['${VM2_PRIVATE_IP}:8000']
        labels:
          vm: 'vm2'
          role: 'backend'

  # VM3 - Backend
  - job_name: 'node-exporter-vm3'
    static_configs:
      - targets: ['${VM3_PRIVATE_IP}:9100']
        labels:
          vm: 'vm3'
          role: 'backend'

  - job_name: 'cadvisor-vm3'
    static_configs:
      - targets: ['${VM3_PRIVATE_IP}:8080']
        labels:
          vm: 'vm3'
          role: 'backend'

  - job_name: 'backend-vm3'
    static_configs:
      - targets: ['${VM3_PRIVATE_IP}:8000']
        labels:
          vm: 'vm3'
          role: 'backend'

  # VM4 - MongoDB Primary (nếu có node-exporter)
  - job_name: 'node-exporter-vm4'
    static_configs:
      - targets: ['${VM4_PRIVATE_IP}:9100']
        labels:
          vm: 'vm4'
          role: 'database'
