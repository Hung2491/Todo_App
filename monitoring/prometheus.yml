global:
  scrape_interval: 15s # Cứ 15 giây lấy dữ liệu 1 lần

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - 'alertmanager:9093'
      
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter' # Soi tài nguyên máy thật (CPU, RAM máy ảo)
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor' # Soi tài nguyên của từng Container Docker
    static_configs:
      - targets: ['cadvisor:8080']
