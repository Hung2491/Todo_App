groups:
- name: todo_app_rules
  rules:

  - alert: InstanceDown
    expr: up == 0
    for: 30s    # giảm từ 1m xuống 30s
    labels:
      severity: critical
    annotations:
      summary: "Service ngừng hoạt động!"
      description: "Dịch vụ {{ $labels.job }} - instance {{ $labels.instance }} đã ngừng hoạt động hơn 1 phút."

  - alert: HighCPUUsage
    expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 85
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "CPU cao!"
      description: "Instance {{ $labels.instance }} đang dùng hơn 85% CPU trong 2 phút."

  - alert: HighMemoryUsage
    expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "RAM sắp đầy!"
      description: "Instance {{ $labels.instance }} đang dùng hơn 85% RAM."

  - alert: DiskSpaceLow
    expr: (1 - node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"}) * 100 > 85
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "Disk sắp đầy!"
      description: "Instance {{ $labels.instance }} còn dưới 15% dung lượng disk."

  - alert: ContainerDown
    expr: absent(container_memory_usage_bytes{name="todo-app-frontend"})
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Container frontend down!"
      description: "Container todo-app-frontend không còn chạy trên VM1."

  - alert: AbnormalRequestRate
    expr: rate(node_network_receive_packets_total{job="node-exporter-vm1",device!="lo"}[1m]) > 10000
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "Traffic bất thường!"
      description: "VM1 đang nhận hơn 10k packets/s - có thể đang bị tấn công."
