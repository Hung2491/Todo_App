upstream backend_servers {
    # Dùng tên service 'backend' trong mạng nội bộ Docker
    server backend:8000 weight=2;
    server ${SERVER_PRIVATE_IP}:8000 weight=1;
}

server {
    listen 3002;
    # Nginx Docker sẽ tự thay biến này từ môi trường
    server_name ${VM2_PRIVATE_IP};

    location / {
        root /usr/share/nginx/html/todo-app; 
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /tasks {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
