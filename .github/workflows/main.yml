name: CI/CD Docker Deploy

on:
  push:
    branches: ["main"]

jobs:

  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for build
        run: |
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          docker compose -f docker-compose.yml build
          docker compose -f docker-compose.yml push

  deploy-vm1:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Tạo .env VM1
        run: |
          echo "VM_PUBLIC_IP=${{ secrets.VM1_PUBLIC_IP }}" > .env

      - name: Generate Monitoring Configs
        run: |
          export VM2_PRIVATE_IP=${{ secrets.VM2_PRIVATE_IP }}
          export VM3_PRIVATE_IP=${{ secrets.VM3_PRIVATE_IP }}
          export VM4_PRIVATE_IP=${{ secrets.VM4_PRIVATE_IP }}
          export TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          export TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          
          envsubst < monitoring/prometheus.yml > monitoring/prometheus.tmp.yml
          mv monitoring/prometheus.tmp.yml monitoring/prometheus.yml
          envsubst < monitoring/alertmanager.yml > monitoring/alertmanager.tmp.yml
          mv monitoring/alertmanager.tmp.yml monitoring/alertmanager.yml

      - name: Copy files lên VM1
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM1_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.VM1_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml,.env,nginx/,monitoring/"
          target: "~/project/Todo_App"

      - name: Deploy VM1
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM1_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.VM1_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/project/Todo_App/
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
            docker image prune -f

  deploy-workers:
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      matrix:
        worker: [vm2, vm3]
        include:
          - worker: vm2
            host: VM2_HOST
            key: VM2_SSH_KEY
            env: ENV_FILE_VM2 
          - worker: vm3
            host: VM3_HOST
            key: VM3_SSH_KEY
            env: ENV_FILE_VM3 
    steps:
      - uses: actions/checkout@v4

      - name: Tạo .env cho ${{ matrix.worker }}
        run: |
          # Dùng cat EOF để giữ nguyên định dạng nhiều dòng của Secret
          cat << EOF > .env
          ${{ secrets[matrix.env] }}
          EOF

      - name: Copy files lên ${{ matrix.worker }}
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets[matrix.host] }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets[matrix.key] }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml,.env"
          target: "~/project/Todo_App"

      - name: Deploy ${{ matrix.worker }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets[matrix.host] }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets[matrix.key] }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/project/Todo_App/
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
            docker image prune -f
