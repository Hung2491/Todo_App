name: CI/CD Docker Deploy

on:
  push:
    branches: ["main"]

jobs:

  # ================= BUILD =================
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for build
        run: |
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend
        run: |
          docker compose -f docker-compose.yml build --no-cache
          docker compose -f docker-compose.yml push

      - name: Build and Push Backend
        run: |
          docker compose -f docker-compose.worker.yml build --no-cache backend
          docker compose -f docker-compose.worker.yml push backend


  # ================= DEPLOY VM1 + VM5 =================
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-and-push

    strategy:
      matrix:
        include:
          - name: vm1
            host: VM1_HOST
            key: VM1_SSH_KEY
            env: ENV_FILE_VM

          - name: vm5
            host: VM5_HOST
            key: VM5_SSH_KEY
            env: ENV_FILE_VM

    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          echo "${{ secrets[matrix.env] }}" > .env

      - name: Generate Monitoring Configs
        env:
          VM2_PRIVATE_IP: ${{ secrets.VM2_PRIVATE_IP }}
          VM3_PRIVATE_IP: ${{ secrets.VM3_PRIVATE_IP }}
          VM4_PRIVATE_IP: ${{ secrets.VM4_PRIVATE_IP }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          envsubst < monitoring/prometheus.yml > monitoring/prometheus.yml.tmp
          mv monitoring/prometheus.yml.tmp monitoring/prometheus.yml

          envsubst < monitoring/alertmanager.yml > monitoring/alertmanager.yml.tmp
          mv monitoring/alertmanager.yml.tmp monitoring/alertmanager.yml

      - name: Copy files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets[matrix.host] }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets[matrix.key] }}
          port: ${{ secrets.SERVER_PORT }}
          source: "FE-Todo/,docker-compose.yml,.env,nginx/,monitoring/"
          target: "~/project/Todo_App"

      - name: Deploy ${{ matrix.name }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets[matrix.host] }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets[matrix.key] }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/project/Todo_App
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker compose down
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans

            docker image prune -f


  # ================= DEPLOY WORKERS (VM2 + VM3) =================
  deploy-workers:
    needs: build-and-push
    strategy:
      matrix:
        include:
          - vm: vm2
            runs_on: '["self-hosted","linux","vm2"]'
            env: ENV_FILE_VM
          - vm: vm3
            runs_on: '["self-hosted","linux","vm3"]'
            env: ENV_FILE_VM

    runs-on: ${{ fromJson(matrix.runs_on) }}

    steps:
      - uses: actions/checkout@v4

      - name: Update project source
        run: |
          cd ~/project/Todo_App
          git fetch --all
          git reset --hard origin/${{ github.ref_name }}
          git clean -fd

      - name: Create .env
        run: |
          cat << 'ENVEOF' > ~/project/Todo_App/.env
          ${{ secrets[matrix.env] }}
          ENVEOF
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> ~/project/Todo_App/.env

      - name: Setup mongo keyfile
        run: |
          echo "${{ secrets.MONGO_KEYFILE }}" > ~/project/Todo_App/mongo-keyfile
          chmod 400 ~/project/Todo_App/mongo-keyfile
          sudo chown 999:999 ~/project/Todo_App/mongo-keyfile

      - name: Deploy ${{ matrix.vm }}
        run: |
          cd ~/project/Todo_App

          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          docker compose -f docker-compose.worker.yml down
          docker image rm ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:latest || true
          docker compose -f docker-compose.worker.yml pull
          docker compose -f docker-compose.worker.yml up -d --force-recreate --remove-orphans

          docker image prune -f
