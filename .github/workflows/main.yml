name: CI/CD Docker Deploy

on:
  push:
    branches: ["main"]

env:
  IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-frontend
  IMAGE_BACKEND:  ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-backend

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# BUILD — FE & BE song song
# ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: "Build & Push Frontend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./FE-Todo
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_FRONTEND }}:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_FRONTEND }}:cache,mode=max

  build-backend:
    name: "Build & Push Backend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./BE-Todo
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_BACKEND }}:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_BACKEND }}:cache,mode=max

# ─────────────────────────────────────────────────────────────────────────────
# DEPLOY LB — VM1 & VM5 song song, self-hosted runners
# ─────────────────────────────────────────────────────────────────────────────
  deploy-lb:
    name: "Deploy ${{ matrix.vm }}"
    needs: [build-frontend, build-backend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - vm: vm1
            runner: [self-hosted, linux, vm1]
          - vm: vm5
            runner: [self-hosted, linux, vm5]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync code to project directory
        run: |
          mkdir -p /root/project/Todo_App
          rsync -avz --delete --exclude '.git' ./ /root/project/Todo_App/

      - name: Render monitoring configs
        working-directory: /root/project/Todo_App
        env:
          VM1_PRIVATE_IP:     ${{ secrets.VM1_PRIVATE_IP }}
          VM2_PRIVATE_IP:     ${{ secrets.VM2_PRIVATE_IP }}
          VM3_PRIVATE_IP:     ${{ secrets.VM3_PRIVATE_IP }}
          VM4_PRIVATE_IP:     ${{ secrets.VM4_PRIVATE_IP }}
          VM5_PRIVATE_IP:     ${{ secrets.VM5_PRIVATE_IP }}
          VM_PUBLIC_IP:       ${{ secrets.VM_PUBLIC_IP }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          for f in monitoring/prometheus/prometheus.yml monitoring/alertmanager/alertmanager.yml; do
            [ -f "$f" ] || { echo "ERROR: $f not found"; exit 1; }
            envsubst < "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done

      - name: Cleanup
        working-directory: /root/project/Todo_App
        run: |
          docker compose down --remove-orphans || true
          # Kill bất kỳ tiến trình nào đang chiếm port 8081 (cadvisor)
          sudo fuser -k 8081/tcp || true
          docker ps -aq | xargs -r docker rm -f || true
          docker image prune -af || true

      - name: Deploy
        working-directory: /root/project/Todo_App
        run: |
          set -e
          printf '%s\n' "$ENV_CONTENT"        > .env
          echo "DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME" >> .env
          echo "VM2_PRIVATE_IP=$VM2_PRIVATE_IP"         >> .env
          echo "VM3_PRIVATE_IP=$VM3_PRIVATE_IP"         >> .env
          echo "VM_PUBLIC_IP=$VM_PUBLIC_IP"             >> .env
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          
          # Thử lại pull 3 lần nếu lỗi mạng
          for i in {1..3}; do
            docker compose pull && break || {
              if [ $i -lt 3 ]; then
                echo "Pull failed, retrying in 5s... ($i/3)"
                sleep 5
              else
                echo "Pull failed after 3 attempts."
                exit 1
              fi
            }
          done

          docker compose up -d --remove-orphans
          docker image prune -f
        env:
          ENV_CONTENT:        ${{ secrets.ENV_FILE_VM }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}
          VM2_PRIVATE_IP:     ${{ secrets.VM2_PRIVATE_IP }}
          VM3_PRIVATE_IP:     ${{ secrets.VM3_PRIVATE_IP }}
          VM_PUBLIC_IP:       ${{ secrets.VM_PUBLIC_IP }}

# ─────────────────────────────────────────────────────────────────────────────
# DEPLOY WORKERS — VM2 & VM3 song song, self-hosted runners
# ─────────────────────────────────────────────────────────────────────────────
  deploy-worker:
    name: "Deploy ${{ matrix.vm }}"
    needs: [build-frontend, build-backend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - vm: vm2
            runner: [self-hosted, linux, vm2]
          - vm: vm3
            runner: [self-hosted, linux, vm3]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync code to project directory
        run: |
          mkdir -p /root/project/Todo_App
          rsync -avz --delete --exclude '.git' ./ /root/project/Todo_App/

      - name: Setup Mongo keyfile
        working-directory: /root/project/Todo_App
        run: |
          echo "$MONGO_KEYFILE" | sudo tee /etc/mongo-keyfile > /dev/null
          sudo chmod 400 /etc/mongo-keyfile
          sudo chown 999:999 /etc/mongo-keyfile || true
        env:
          MONGO_KEYFILE: ${{ secrets.MONGO_KEYFILE }}

      - name: Cleanup
        working-directory: /root/project/Todo_App
        run: |
          docker compose -f docker-compose.worker.yml down --remove-orphans || true
          # Kill bất kỳ tiến trình nào đang chiếm port 8081 (cadvisor)
          sudo fuser -k 8081/tcp || true
          docker ps -aq | xargs -r docker rm -f || true
          docker image prune -af || true

      - name: Deploy
        working-directory: /root/project/Todo_App
        run: |
          set -e
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          
          # Thử lại pull 3 lần nếu lỗi mạng
          for i in {1..3}; do
            docker compose -f docker-compose.worker.yml pull && break || {
              if [ $i -lt 3 ]; then
                echo "Pull failed, retrying in 5s... ($i/3)"
                sleep 5
              else
                echo "Pull failed after 3 attempts."
                exit 1
              fi
            }
          done

          docker compose -f docker-compose.worker.yml up -d --remove-orphans
          docker image prune -f
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}