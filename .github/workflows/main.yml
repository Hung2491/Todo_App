deploy-workers:
  needs: build-and-push
  strategy:
    matrix:
      include:
        - vm: vm2
          runs_on: '["self-hosted","linux","vm2"]'
          env: ENV_FILE_VM2
        - vm: vm3
          runs_on: '["self-hosted","linux","vm3"]'
          env: ENV_FILE_VM3

  runs-on: ${{ fromJson(matrix.runs_on) }}

  steps:
    - uses: actions/checkout@v4

    # 🔥 FIX 1: update đúng folder project (không phải workspace)
    - name: Update project source
      run: |
        cd ~/project/Todo_App
        git fetch --all
        git reset --hard origin/${{ github.ref_name }}
        git clean -fd

    # 🔥 FIX 2: sync thêm monitoring + compose (đảm bảo config mới)
    - name: Sync config files
      run: |
        rsync -av --delete monitoring/ ~/project/Todo_App/monitoring/
        rsync -av docker-compose.worker.yml ~/project/Todo_App/

    # 🔥 FIX 3: tạo .env ĐÚNG chỗ
    - name: Create .env
      run: |
        cat << 'ENVEOF' > ~/project/Todo_App/.env
        ${{ secrets[matrix.env] }}
        ENVEOF
        echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> ~/project/Todo_App/.env

    # 🔥 FIX 4: keyfile đúng path
    - name: Setup mongo keyfile
      run: |
        echo "${{ secrets.MONGO_KEYFILE }}" > ~/project/Todo_App/mongo-keyfile
        chmod 400 ~/project/Todo_App/mongo-keyfile
        sudo chown 999:999 ~/project/Todo_App/mongo-keyfile

    # 🔥 FIX 5: tránh cache latest
    - name: Deploy ${{ matrix.vm }}
      run: |
        cd ~/project/Todo_App

        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
        
        docker compose -f docker-compose.worker.yml down
        
        docker image rm ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:latest || true
        
        docker compose -f docker-compose.worker.yml pull
        docker compose -f docker-compose.worker.yml up -d --force-recreate --remove-orphans

        docker image prune -f
