name: CI/CD Docker Deploy

on:
  push:
    branches: ["main"]

jobs:

  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for build
        run: |
          echo "${{ secrets.ENV_FILE_VM1 }}" > .env
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          docker compose -f docker-compose.yml build
          docker compose -f docker-compose.yml push

  deploy-vm1:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Generate prometheus.yml với IP thực
        run: |
          export VM2_PRIVATE_IP=${{ secrets.VM2_PRIVATE_IP }}
          export VM3_PRIVATE_IP=${{ secrets.VM3_PRIVATE_IP }}
          export VM4_PRIVATE_IP=${{ secrets.VM4_PRIVATE_IP }}
          envsubst < monitoring/prometheus.yml > monitoring/prometheus.tmp.yml
          mv monitoring/prometheus.tmp.yml monitoring/prometheus.yml

      - name: Tạo .env VM1
        run: |
          echo "${{ secrets.ENV_FILE_VM1 }}" > .env
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
          echo "VM2_PRIVATE_IP=${{ secrets.VM2_PRIVATE_IP }}" >> .env
          echo "VM3_PRIVATE_IP=${{ secrets.VM3_PRIVATE_IP }}" >> .env
          echo "VM4_PRIVATE_IP=${{ secrets.VM4_PRIVATE_IP }}" >> .env

      - name: Copy files lên VM1
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM1_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.VM1_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml,.env,nginx/,monitoring/"
          target: "~/project/Todo_App"

      - name: Deploy VM1
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM1_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.VM1_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/project/Todo_App
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d --force-recreate
            docker image prune -f

  deploy-vm2:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Tạo .env VM2
        run: |
          echo "${{ secrets.ENV_FILE_VM2 }}" > .env
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
          echo "VM3_PRIVATE_IP=${{ secrets.VM3_PRIVATE_IP }}" >> .env
          echo "VM4_PRIVATE_IP=${{ secrets.VM4_PRIVATE_IP }}" >> .env

      - name: Copy files lên VM2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM2_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.VM2_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml,.env"
          target: "~/project/Todo_App"

      - name: Deploy VM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM2_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.VM2_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/project/Todo_App
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d --force-recreate
            docker image prune -f
