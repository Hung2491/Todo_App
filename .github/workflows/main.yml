name: CI/CD Docker HA Deploy

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for build
        run: |
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
          echo "SERVER_PRIVATE_IP=${{ secrets.SERVER_PRIVATE_IP }}" >> .env
          echo "REMOTE_IP=${{ secrets.SERVER_PRIVATE_IP }}" >> .env
          

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Images
        run: |
          # Load username để Docker Compose build đúng tag image
          export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          docker compose build
          docker compose push

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- BƯỚC 1: COPY FILE CONFIG (Dùng chung cho cả 2 VM) ---
      - name: Copy configs to VM1 & VM2
        uses: appleboy/scp-action@master
        with:
          # Thêm cả 2 host vào đây để copy 1 lần
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml,nginx/,monitoring/"
          target: "~/project/Todo_App"

      # --- BƯỚC 2: DEPLOY VM1 ---
      - name: Deploy VM1
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/project/Todo_App
            # Tạo file .env riêng cho VM1
            echo "${{ secrets.ENV_FILE }}" > .env
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
            echo "REMOTE_IP=${{ secrets.VM2_PRIVATE_IP }}" >> .env
            
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f

      # --- BƯỚC 3: DEPLOY VM2 ---
      - name: Deploy VM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM2_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.VM2_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/project/Todo_App
            # Tạo file .env riêng cho VM2 (REMOTE_IP quay về VM1)
            echo "${{ secrets.ENV_FILE }}" > .env
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
            echo "REMOTE_IP=${{ secrets.VM1_PRIVATE_IP }}" >> .env
            
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose pull
            # VM2 chỉ chạy app và LB, ko cần cụm monitoring nếu muốn tiết kiệm tài nguyên
            docker compose up -d --force-recreate
            docker image prune -f
