name: CI/CD Docker Deploy

on:
  push:
    branches: ["main"]

env:
  IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-frontend
  IMAGE_BACKEND:  ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-backend

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# BUILD — FE & BE song song
# ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: "Build & Push Frontend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./FE-Todo
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_FRONTEND }}:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_FRONTEND }}:cache,mode=max

  build-backend:
    name: "Build & Push Backend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./BE-Todo
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_BACKEND }}:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_BACKEND }}:cache,mode=max

# ─────────────────────────────────────────────────────────────────────────────
# DEPLOY LB (VM1 & VM5) — song song
# ─────────────────────────────────────────────────────────────────────────────
  deploy-lb:
    name: "Deploy ${{ matrix.vm }} (LB + FE + Monitor)"
    needs: [build-frontend, build-backend]
    strategy:
      matrix:
        vm: [vm1, vm5]
        include:
          - vm: vm1
            runs_on: ["self-hosted", "linux", "vm1"]
          - vm: vm5
            runs_on: ["self-hosted", "linux", "vm5"]
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - name: Render monitoring configs
        shell: bash
        env:
          VM1_PRIVATE_IP:     ${{ secrets.VM1_PRIVATE_IP }}
          VM2_PRIVATE_IP:     ${{ secrets.VM2_PRIVATE_IP }}
          VM3_PRIVATE_IP:     ${{ secrets.VM3_PRIVATE_IP }}
          VM4_PRIVATE_IP:     ${{ secrets.VM4_PRIVATE_IP }}
          VM5_PRIVATE_IP:     ${{ secrets.VM5_PRIVATE_IP }}
          VM_PUBLIC_IP:       ${{ secrets.VM_PUBLIC_IP }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          for f in monitoring/prometheus/prometheus.yml monitoring/alertmanager/alertmanager.yml; do
            [ -f "$f" ] || { echo "ERROR: $f not found"; exit 1; }
            envsubst < "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done

      - name: Write .env and Deploy
        shell: bash
        run: |
          set -e
          cd ~/project/Todo_App
          printf '%s\n' "$ENV_CONTENT" > .env
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
          docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker compose pull
          docker compose up -d --force-recreate --remove-orphans
          docker image prune -f
        env:
          ENV_CONTENT: ${{ secrets.ENV_FILE_VM }}

# ─────────────────────────────────────────────────────────────────────────────
# DEPLOY WORKERS (VM2 & VM3) — song song
# ─────────────────────────────────────────────────────────────────────────────
  deploy-worker:
    name: Deploy ${{ matrix.vm }} (BE + Mongo Secondary)
    needs: [build-frontend, build-backend]
    strategy:
      matrix:
        vm: [vm2, vm3]
        include:
          - vm: vm2
            runs_on: ["self-hosted", "linux", "vm2"]
          - vm: vm3
            runs_on: ["self-hosted", "linux", "vm3"]
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - name: Write .env and Deploy
        shell: bash
        run: |
          set -e
          cd ~/project/Todo_App
          printf '%s\n' "$ENV_CONTENT" > .env
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
          docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker compose -f docker-compose.worker.yml pull
          docker compose -f docker-compose.worker.yml up -d --force-recreate --remove-orphans
          docker image prune -f
        env:
          ENV_CONTENT: ${{ secrets.ENV_FILE_VM }}
