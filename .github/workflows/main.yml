name: CI/CD Docker HA Deploy

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: checkout@v4

      # Tạo file .env giả để docker compose build không báo lỗi thiếu file
      - name: Create dummy .env for build
        run: |
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
          echo "SERVER_PRIVATE_IP=127.0.0.1" >> .env
          echo "REMOTE_IP=127.0.0.1" >> .env

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Images
        run: |
          export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          docker compose build
          docker compose push

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: checkout@v4

      # FIX 1: Copy config lên cả 2 VM cùng lúc
      - name: Copy configs to VM1 & VM2
        uses: appleboy/scp-action@master
        with:
          host: "${{ secrets.SERVER_HOST }},${{ secrets.VM2_HOST }}"
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml,nginx/,monitoring/"
          target: "~/project/Todo_App"

      # FIX 2: Deploy VM1 (REMOTE trỏ sang VM2)
      - name: Deploy VM1
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            mkdir -p ~/project/Todo_App
            cd ~/project/Todo_App
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
            echo "REMOTE_IP=${{ secrets.VM2_PRIVATE_IP }}" >> .env
            echo "SERVER_PRIVATE_IP=${{ secrets.VM1_PRIVATE_IP }}" >> .env         
            echo "${{ secrets.ENV_FILE }}" >> .env
            
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose pull
            docker compose up -d --force-recreate

      # FIX 3: Deploy VM2 (REMOTE trỏ ngược về VM1)
      - name: Deploy VM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM2_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.VM2_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            mkdir -p ~/project/Todo_App
            cd ~/project/Todo_App
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
            # Chỗ này cực quan trọng: REMOTE_IP của VM2 phải là IP của VM1
            echo "REMOTE_IP=${{ secrets.VM1_PRIVATE_IP }}" >> .env
            echo "SERVER_PRIVATE_IP=${{ secrets.VM2_PRIVATE_IP }}" >> .env
            echo "${{ secrets.ENV_FILE }}" >> .env
            
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose pull
            # VM2 không cần chạy monitoring cho nhẹ máy
            docker compose up -d frontend backend cadvisor node-exporter --force-recreate
