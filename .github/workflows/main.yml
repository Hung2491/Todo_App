name: CI/CD Docker Deploy

on:
  push:
    branches: ["main"]

env:
  IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-frontend
  IMAGE_BACKEND:  ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-backend

# ─────────────────────────────────────────────────────────────────────────────
# BUILD — FE & BE song song
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-frontend:
    name: "Build & Push Frontend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./FE-Todo
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_FRONTEND }}:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_FRONTEND }}:cache,mode=max

  build-backend:
    name: "Build & Push Backend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./BE-Todo
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_BACKEND }}:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_BACKEND }}:cache,mode=max

# ─────────────────────────────────────────────────────────────────────────────
# DEPLOY LB — VM1 & VM5 song song
# ─────────────────────────────────────────────────────────────────────────────
  deploy-lb:
    name: "Deploy ${{ matrix.vm }} — LB + FE + Monitor"
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    strategy:
      fail-fast: false
      matrix:
        vm: [vm1, vm5]
        include:
          - vm: vm1
            host_secret: VM1_HOST
            key_secret:  VM1_SSH_KEY
            env_secret:  ENV_FILE_VM
            user_secret: SERVER_USER
          - vm: vm5
            host_secret: VM5_HOST
            key_secret:  VM5_SSH_KEY
            env_secret:  ENV_FILE_VM
            user_secret: SERVER_USER
    steps:
      - uses: actions/checkout@v4

      - name: Render monitoring configs
        env:
          VM1_PRIVATE_IP:     ${{ secrets.VM1_PRIVATE_IP }}
          VM2_PRIVATE_IP:     ${{ secrets.VM2_PRIVATE_IP }}
          VM3_PRIVATE_IP:     ${{ secrets.VM3_PRIVATE_IP }}
          VM4_PRIVATE_IP:     ${{ secrets.VM4_PRIVATE_IP }}
          VM5_PRIVATE_IP:     ${{ secrets.VM5_PRIVATE_IP }}
          VM_PUBLIC_IP:       ${{ secrets.VM_PUBLIC_IP }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          for f in monitoring/prometheus/prometheus.yml monitoring/alertmanager/alertmanager.yml; do
            [ -f "$f" ] || { echo "ERROR: $f not found"; exit 1; }
            envsubst < "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done

      - name: Copy files to ${{ matrix.vm }}
        uses: appleboy/scp-action@master
        with:
          host:     ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets[matrix.user_secret] }}
          key:      ${{ secrets[matrix.key_secret] }}
          port:     ${{ secrets.SERVER_PORT }}
          source:   "docker-compose.yml,nginx/,monitoring/"
          target:   "~/project/Todo_App"

      - name: SSH Deploy ${{ matrix.vm }}
        uses: appleboy/ssh-action@master
        with:
          host:     ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets[matrix.user_secret] }}
          key:      ${{ secrets[matrix.key_secret] }}
          port:     ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd ~/project/Todo_App
            
            docker compose down --remove-orphans || true
            docker ps -q | xargs -r docker stop || true
            docker ps -aq | xargs -r docker rm -f || true
            docker image prune -af || true

            printf '%s\n' "$ENV_CONTENT" > .env
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
            docker image prune -f
        env:
          ENV_CONTENT:        ${{ secrets[matrix.env_secret] }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# DEPLOY WORKERS — VM2 & VM3 song song (self-hosted runners)
# ─────────────────────────────────────────────────────────────────────────────
  deploy-vm2:
    name: "Deploy vm2 — BE + Mongo Secondary"
    runs-on: ["self-hosted", "linux", "vm2"]
    needs: [build-frontend, build-backend]
    steps:
      - uses: actions/checkout@v4
      - name: "Setup Mongo Keyfile"
        run: |
          echo "$MONGO_KEYFILE" | sudo tee /etc/mongo-keyfile > /dev/null
          sudo chmod 400 /etc/mongo-keyfile
          sudo chown mongodb:mongodb /etc/mongo-keyfile || true
        env:
          MONGO_KEYFILE: ${{ secrets.MONGO_KEYFILE }}
      - name: "Cleanup & Deploy"
        run: |
          set -e
          docker compose -f docker-compose.worker.yml down --remove-orphans || true
          docker ps -q | xargs -r docker stop || true
          docker ps -aq | xargs -r docker rm -f || true
          docker image prune -af || true

          printf '%s\n' "$ENV_CONTENT" > .env
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          docker compose -f docker-compose.worker.yml pull
          docker compose -f docker-compose.worker.yml up -d --remove-orphans
          docker image prune -f
        env:
          ENV_CONTENT:        ${{ secrets.ENV_FILE_VM }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}

  deploy-vm3:
    name: "Deploy vm3 — BE + Mongo Secondary"
    runs-on: ["self-hosted", "linux", "vm3"]
    needs: [build-frontend, build-backend]
    steps:
      - uses: actions/checkout@v4
      - name: "Setup Mongo Keyfile"
        run: |
          echo "$MONGO_KEYFILE" | sudo tee /etc/mongo-keyfile > /dev/null
          sudo chmod 400 /etc/mongo-keyfile
          sudo chown mongodb:mongodb /etc/mongo-keyfile || true
        env:
          MONGO_KEYFILE: ${{ secrets.MONGO_KEYFILE }}
      - name: "Cleanup & Deploy"
        run: |
          set -e
          docker compose -f docker-compose.worker.yml down --remove-orphans || true
          docker ps -q | xargs -r docker stop || true
          docker ps -aq | xargs -r docker rm -f || true
          docker image prune -af || true

          printf '%s\n' "$ENV_CONTENT" > .env
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          docker compose -f docker-compose.worker.yml pull
          docker compose -f docker-compose.worker.yml up -d --remove-orphans
          docker image prune -f
        env:
          ENV_CONTENT:        ${{ secrets.ENV_FILE_VM }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}