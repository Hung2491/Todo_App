name: CI/CD Docker Deploy

on:
  push:
    branches: ["main"]

# ─── 1. BUILD & PUSH ──────────────────────────────────────────────────────────
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tạo .env cho build
        run: |
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend
        run: |
          docker compose -f docker-compose.yml build --no-cache frontend
          docker compose -f docker-compose.yml push frontend

      - name: Build & Push Backend
        run: |
          docker compose -f docker-compose.worker.yml build --no-cache backend
          docker compose -f docker-compose.worker.yml push backend

# ─── 2. DEPLOY VM1 + VM5 (matrix, SSH vào chạy thẳng) ───────────────────────
  deploy-lb:
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      fail-fast: false          # VM còn lại vẫn deploy dù 1 VM lỗi
      matrix:
        include:
          - vm: vm1
            host_secret: VM1_HOST
            ssh_key_secret: VM1_SSH_KEY
            env_secret: ENV_FILE_VM1
          - vm: vm5
            host_secret: VM5_HOST
            ssh_key_secret: VM5_SSH_KEY
            env_secret: ENV_FILE_VM5

    steps:
      - uses: actions/checkout@v4

      - name: Tạo .env cho ${{ matrix.vm }}
        run: |
          echo "${{ secrets[matrix.env_secret] }}" > .env

      - name: Generate Monitoring Configs
        env:
          VM2_PRIVATE_IP: ${{ secrets.VM2_PRIVATE_IP }}
          VM3_PRIVATE_IP: ${{ secrets.VM3_PRIVATE_IP }}
          VM4_PRIVATE_IP: ${{ secrets.VM4_PRIVATE_IP }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          envsubst < monitoring/prometheus.yml    > monitoring/prometheus.rendered.yml
          mv monitoring/prometheus.rendered.yml     monitoring/prometheus.yml
          envsubst < monitoring/alertmanager.yml  > monitoring/alertmanager.rendered.yml
          mv monitoring/alertmanager.rendered.yml   monitoring/alertmanager.yml

      - name: Copy files lên ${{ matrix.vm }}
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets[matrix.ssh_key_secret] }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml,.env,nginx/,monitoring/"
          target: "~/project/Todo_App"

      - name: Deploy ${{ matrix.vm }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets[matrix.ssh_key_secret] }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd ~/project/Todo_App

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
            docker image prune -f

            # Verify
            sleep 5
            docker compose ps

# ─── 3. DEPLOY VM2 + VM3 (matrix, self-hosted runner) ───────────────────────
  deploy-workers:
    needs: build-and-push
    strategy:
      fail-fast: false
      matrix:
        include:
          - vm: vm2
            runner: '["self-hosted","linux","vm2"]'
            env_secret: ENV_FILE_VM
          - vm: vm3
            runner: '["self-hosted","linux","vm3"]'
            env_secret: ENV_FILE_VM

    runs-on: ${{ fromJson(matrix.runner) }}
    steps:
      - uses: actions/checkout@v4

      - name: Tạo .env cho ${{ matrix.vm }}
        run: |
          cat << 'ENVEOF' > .env
          ${{ secrets[matrix.env_secret] }}
          ENVEOF
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env

      - name: Deploy ${{ matrix.vm }}
        run: |
          set -e
          cd ~/project/Todo_App

          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

          docker compose -f docker-compose.worker.yml pull
          docker compose -f docker-compose.worker.yml up -d --force-recreate --remove-orphans
          docker image prune -f

          # Verify
          sleep 5
          docker compose -f docker-compose.worker.yml ps