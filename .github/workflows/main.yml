name: CI/CD Docker Deploy

on:
  push:
    branches: ["main"]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Build và push image lên Docker Hub
  # ─────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for build
        run: |
          echo "${{ secrets.ENV_FILE_VM1 }}" > .env
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push images
        run: |
          docker compose -f docker-compose.vm1.yml build
          docker compose -f docker-compose.vm1.yml push

  # ─────────────────────────────────────────────
  # JOB 2: Deploy lên VM1
  # ─────────────────────────────────────────────
  deploy-vm1:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Tạo .env cho VM1
        run: |
          echo "${{ secrets.ENV_FILE_VM1 }}" > .env
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
          echo "PARTNER_IP=${{ secrets.VM2_PRIVATE_IP }}" >> .env
          echo "VM3_PRIVATE_IP=${{ secrets.VM3_PRIVATE_IP }}" >> .env
          echo "VM4_PRIVATE_IP=${{ secrets.VM4_PRIVATE_IP }}" >> .env

      - name: Generate prometheus.yml
        run: |
          export VM2_PRIVATE_IP=${{ secrets.VM2_PRIVATE_IP }}
          export VM3_PRIVATE_IP=${{ secrets.VM3_PRIVATE_IP }}
          export VM4_PRIVATE_IP=${{ secrets.VM4_PRIVATE_IP }}
          envsubst < monitoring/prometheus.yml > monitoring/prometheus.tmp.yml
          mv monitoring/prometheus.tmp.yml monitoring/prometheus.yml

      - name: Copy files lên VM1
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM1_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.VM1_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.vm1.yml,.env,nginx/,monitoring/"
          target: "~/project/Todo_App"

      - name: Deploy VM1
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM1_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.VM1_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/project/Todo_App
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose -f docker-compose.vm1.yml pull
            docker compose -f docker-compose.vm1.yml up -d --force-recreate
            docker image prune -f

  # ─────────────────────────────────────────────
  # JOB 3: Deploy lên VM2
  # ─────────────────────────────────────────────
  deploy-vm2:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Tạo .env cho VM2
        run: |
          echo "${{ secrets.ENV_FILE_VM2 }}" > .env
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
          echo "PARTNER_IP=${{ secrets.VM1_PRIVATE_IP }}" >> .env
          echo "VM3_PRIVATE_IP=${{ secrets.VM3_PRIVATE_IP }}" >> .env
          echo "VM4_PRIVATE_IP=${{ secrets.VM4_PRIVATE_IP }}" >> .env

      - name: Copy files lên VM2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM2_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.VM2_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.vm2.yml,.env,nginx/"
          target: "~/project/Todo_App"

      - name: Deploy VM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM2_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.VM2_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/project/Todo_App
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose -f docker-compose.vm2.yml pull
            docker compose -f docker-compose.vm2.yml up -d --force-recreate
            docker image prune -f
