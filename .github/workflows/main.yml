name: CI/CD Docker Deploy

on:
  push:
    branches: ["main"]

# ─── 1. BUILD & PUSH ──────────────────────────────────────────────────────────
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tạo .env cho build
        run: |
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend
        run: |
          docker compose -f docker-compose.yml build --no-cache frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-frontend:latest

      - name: Build & Push Backend
        run: |
          docker compose -f docker-compose.worker.yml build --no-cache backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-backend:latest

# ─── 2. DEPLOY VM1 + VM5 (matrix, SSH) ───────────────────────────────────────
  deploy-lb:
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      fail-fast: false
      matrix:
        include:
          - vm: vm1
            host_secret: VM1_HOST
            ssh_key_secret: VM1_SSH_KEY
          - vm: vm5
            host_secret: VM5_HOST
            ssh_key_secret: VM5_SSH_KEY

    steps:
      - uses: actions/checkout@v4

      - name: Generate Monitoring Configs
        env:
          VM1_PRIVATE_IP: ${{ secrets.VM1_PRIVATE_IP }}
          VM2_PRIVATE_IP: ${{ secrets.VM2_PRIVATE_IP }}
          VM3_PRIVATE_IP: ${{ secrets.VM3_PRIVATE_IP }}
          VM4_PRIVATE_IP: ${{ secrets.VM4_PRIVATE_IP }}
          VM5_PRIVATE_IP: ${{ secrets.VM5_PRIVATE_IP }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ls -R monitoring/
          envsubst < monitoring/prometheus/prometheus.yml    > monitoring/prometheus/prometheus.rendered.yml
          
          # Fix: Nếu là VM cục bộ, dùng service name để tránh lỗi routing Docker
          if [ "${{ matrix.vm }}" == "vm1" ]; then
            sed -i "s/${VM1_PRIVATE_IP}:9113/nginx-exporter:9113/g" monitoring/prometheus/prometheus.rendered.yml
          elif [ "${{ matrix.vm }}" == "vm5" ]; then
            sed -i "s/${VM5_PRIVATE_IP}:9113/nginx-exporter:9113/g" monitoring/prometheus/prometheus.rendered.yml
          fi
          
          mv monitoring/prometheus/prometheus.rendered.yml     monitoring/prometheus/prometheus.yml
          envsubst < monitoring/alertmanager/alertmanager.yml  > monitoring/alertmanager/alertmanager.rendered.yml
          mv monitoring/alertmanager/alertmanager.rendered.yml   monitoring/alertmanager/alertmanager.yml

      - name: Tạo .env cho ${{ matrix.vm }}
        run: |
          cat > .env << EOF
          DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          VM2_PRIVATE_IP=${{ secrets.VM2_PRIVATE_IP }}
          VM3_PRIVATE_IP=${{ secrets.VM3_PRIVATE_IP }}
          VM1_PUBLIC_IP=${{ secrets.VM1_HOST }}
          EOF

      - name: Copy files lên ${{ matrix.vm }}
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets[matrix.ssh_key_secret] }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml,.env,nginx/,monitoring/"
          target: "~/project/Todo_App"

      - name: Deploy ${{ matrix.vm }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets[matrix.ssh_key_secret] }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd ~/project/Todo_App

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
            docker image prune -f

            sleep 5
            docker compose ps

# ─── 3. DEPLOY VM2 + VM3 (matrix, self-hosted runner) ───────────────────────
  deploy-workers:
    needs: build-and-push
    strategy:
      fail-fast: false
      matrix:
        include:
          - vm: vm2
            runner: '["self-hosted","linux","vm2"]'
          - vm: vm3
            runner: '["self-hosted","linux","vm3"]'

    runs-on: ${{ fromJson(matrix.runner) }}
    steps:
      - uses: actions/checkout@v4

      - name: Tạo .env cho ${{ matrix.vm }}
        run: |
          cat > .env << EOF
          DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          MONGO_USER=${{ secrets.MONGO_USER }}
          MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
          VM4_PRIVATE_IP=${{ secrets.VM4_PRIVATE_IP }}
          VM2_PRIVATE_IP=${{ secrets.VM2_PRIVATE_IP }}
          VM3_PRIVATE_IP=${{ secrets.VM3_PRIVATE_IP }}
          EOF

      - name: Deploy ${{ matrix.vm }}
        run: |
          set -e
          cd ~/project/Todo_App

          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

          cp $GITHUB_WORKSPACE/.env .env

          docker compose -f docker-compose.worker.yml pull
          docker compose -f docker-compose.worker.yml up -d --force-recreate --remove-orphans
          docker image prune -f

          sleep 5
          docker compose -f docker-compose.worker.yml ps