name: Deploy Monitoring

on:
  push:
    branches: ["main"]
    paths:
      - 'monitoring/**'
      - '.github/workflows/monitoring.yml'

jobs:
  build-monitoring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Monitoring Configs
        env:
          VM1_PRIVATE_IP: ${{ secrets.VM1_PRIVATE_IP }}
          VM2_PRIVATE_IP: ${{ secrets.VM2_PRIVATE_IP }}
          VM3_PRIVATE_IP: ${{ secrets.VM3_PRIVATE_IP }}
          VM4_PRIVATE_IP: ${{ secrets.VM4_PRIVATE_IP }}
          VM5_PRIVATE_IP: ${{ secrets.VM5_PRIVATE_IP }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          envsubst < monitoring/prometheus/prometheus.yml > monitoring/prometheus/prometheus.yml.tmp
          mv monitoring/prometheus/prometheus.yml.tmp monitoring/prometheus/prometheus.yml

          envsubst < monitoring/alertmanager/alertmanager.yml > monitoring/alertmanager/alertmanager.yml.tmp
          mv monitoring/alertmanager/alertmanager.yml.tmp monitoring/alertmanager/alertmanager.yml

      - name: Build and Push Monitoring Images
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-prometheus:v${{ github.run_number }} ./monitoring/prometheus
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-prometheus:v${{ github.run_number }}
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-alertmanager:v${{ github.run_number }} ./monitoring/alertmanager
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-alertmanager:v${{ github.run_number }}
          
          docker pull grafana/grafana:latest
          docker tag grafana/grafana:latest ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-grafana:v${{ github.run_number }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-grafana:v${{ github.run_number }}
          
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-cadvisor:v${{ github.run_number }} ./monitoring/cadvisor
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-cadvisor:v${{ github.run_number }}
          
          docker pull prom/node-exporter:latest
          docker tag prom/node-exporter:latest ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-node-exporter:v${{ github.run_number }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-node-exporter:v${{ github.run_number }}

  deploy-monitoring:
    runs-on: ubuntu-latest
    needs: build-monitoring

    strategy:
      matrix:
        include:
          - name: vm1
            host: VM1_HOST
            key: VM1_SSH_KEY
            env: ENV_FILE_VM
            private_ip: VM1_PRIVATE_IP
          - name: vm5
            host: VM5_HOST
            key: VM5_SSH_KEY
            env: ENV_FILE_VM
            private_ip: VM5_PRIVATE_IP

    steps:
      - uses: actions/checkout@v4

      - name: Copy files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets[matrix.host] }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets[matrix.key] }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml"
          target: "~/project/Todo_App"

      - name: Deploy ${{ matrix.name }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets[matrix.host] }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets[matrix.key] }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/project/Todo_App
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "${{ secrets[matrix.env] }}" > .env
            echo "BIND_IP=${{ secrets[matrix.private_ip] }}" >> .env
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env

            touch .env.tags
            sed -i '/^MONITORING_TAG=/d' .env.tags
            echo "MONITORING_TAG=v${{ github.run_number }}" >> .env.tags
            cat .env.tags >> .env

            docker compose pull prometheus alertmanager grafana cadvisor node-exporter
            docker compose up -d --force-recreate --remove-orphans prometheus alertmanager grafana cadvisor node-exporter

            docker image prune -af --filter "until=24h"

  deploy-workers-monitoring:
    needs: build-monitoring
    strategy:
      matrix:
        include:
          - vm: vm2
            runs_on: '["self-hosted","linux","vm2"]'
            env: ENV_FILE_VM
            private_ip: VM2_PRIVATE_IP
          - vm: vm3
            runs_on: '["self-hosted","linux","vm3"]'
            env: ENV_FILE_VM
            private_ip: VM3_PRIVATE_IP

    runs-on: ${{ fromJson(matrix.runs_on) }}
    steps:
      - uses: actions/checkout@v4

      - name: Update project source
        run: |
          cd ~/project/Todo_App
          git fetch --all
          git reset --hard origin/main
          
      - name: Create .env
        run: |
          cat << 'ENVEOF' > ~/project/Todo_App/.env
          ${{ secrets[matrix.env] }}
          ENVEOF
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> ~/project/Todo_App/.env
          echo "BIND_IP=${{ secrets[matrix.private_ip] }}" >> ~/project/Todo_App/.env
          
          touch ~/project/Todo_App/.env.tags
          sed -i '/^MONITORING_TAG=/d' ~/project/Todo_App/.env.tags
          echo "MONITORING_TAG=v${{ github.run_number }}" >> ~/project/Todo_App/.env.tags
          cat ~/project/Todo_App/.env.tags >> ~/project/Todo_App/.env

      - name: Deploy ${{ matrix.vm }}
        run: |
          cd ~/project/Todo_App
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          docker stop cadvisor node-exporter || true
          docker rm -f cadvisor node-exporter || true
          
          docker compose -f docker-compose.worker.yml pull cadvisor node-exporter
          docker compose -f docker-compose.worker.yml up -d --force-recreate --remove-orphans cadvisor node-exporter

          docker image prune -af --filter "until=24h"
