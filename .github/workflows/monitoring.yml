name: Deploy Monitoring

on:
  push:
    branches: ["main"]
    paths: ["monitoring/**", ".github/workflows/monitoring.yml"]

jobs:
  build-configs:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        svc: [prometheus, alertmanager]
    steps:
      - uses: actions/checkout@v4
      - name: Generate Config & Build Image
        env:
          VM1_PRIVATE_IP: ${{ secrets.VM1_PRIVATE_IP }}
          VM2_PRIVATE_IP: ${{ secrets.VM2_PRIVATE_IP }}
          VM3_PRIVATE_IP: ${{ secrets.VM3_PRIVATE_IP }}
          VM4_PRIVATE_IP: ${{ secrets.VM4_PRIVATE_IP }}
          VM5_PRIVATE_IP: ${{ secrets.VM5_PRIVATE_IP }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cfg="monitoring/${{ matrix.svc }}/${{ matrix.svc }}.yml"
          envsubst < "$cfg" > "$cfg.tmp" && mv "$cfg.tmp" "$cfg"
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          img="${{ secrets.DOCKERHUB_USERNAME }}/todo-app-${{ matrix.svc }}:v${{ github.run_number }}"
          docker build -t "$img" "./monitoring/${{ matrix.svc }}"
          docker push "$img"

  build-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Static Images
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          for img in grafana cadvisor node-exporter; do
            full_img="${{ secrets.DOCKERHUB_USERNAME }}/todo-app-$img:latest"
            if ! docker manifest inspect "$full_img" >/dev/null 2>&1; then
              if [ "$img" == "cadvisor" ]; then docker build -t "$full_img" ./monitoring/cadvisor;
              else 
                src="grafana/grafana:latest"; [ "$img" == "node-exporter" ] && src="prom/node-exporter:latest"
                docker pull "$src" && docker tag "$src" "$full_img"
              fi
              docker push "$full_img"
            fi
          done

  deploy-monitoring:
    runs-on: ubuntu-latest
    needs: [build-configs, build-static]
    strategy:
      matrix:
        include:
          - name: vm1
            host: VM1_HOST
            key: VM1_SSH_KEY
            ip: VM1_PRIVATE_IP
          - name: vm5
            host: VM5_HOST
            key: VM5_SSH_KEY
            ip: VM5_PRIVATE_IP
    steps:
      - uses: actions/checkout@v4
      - name: Copy files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets[matrix.host] }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets[matrix.key] }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml"
          target: "~/project/Todo_App"
      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets[matrix.host] }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets[matrix.key] }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/project/Todo_App && echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            cat << 'EOF' | sed 's/^[[:space:]]*//' > .env
            ${{ secrets.ENV_FILE_VM }}
            BIND_IP=${{ secrets[matrix.ip] }}
            EOF
            sed -i -e '/^MONITORING_TAG=/d' -e '/^STATIC_TAG=/d' .env.tags 2>/dev/null || touch .env.tags
            printf "MONITORING_TAG=v${{ github.run_number }}\nSTATIC_TAG=latest\n" >> .env.tags
            cat .env.tags >> .env

            # Loại bỏ trùng lặp, giữ lại dòng cuối cùng (giá trị mới nhất)
            tac .env | awk -F= '!a[$1]++' | tac > .env.tmp && mv .env.tmp .env
            docker compose pull prometheus alertmanager grafana cadvisor node-exporter
            docker compose up -d --force-recreate prometheus alertmanager grafana cadvisor node-exporter
            docker image prune -af --filter "until=24h"

  deploy-workers:
    needs: [build-configs, build-static]
    strategy:
      matrix:
        include:
          - vm: vm2
            ip: VM2_PRIVATE_IP
          - vm: vm3
            ip: VM3_PRIVATE_IP
    runs-on: ["self-hosted", "linux", "${{ matrix.vm }}"]
    steps:
      - uses: actions/checkout@v4
      - name: Update & Deploy
        run: |
          cd ~/project/Todo_App && git fetch --all && git reset --hard origin/main
          cat << 'EOF' | sed 's/^[[:space:]]*//' > .env
          ${{ secrets.ENV_FILE_VM }}
          BIND_IP=${{ secrets[matrix.ip] }}
          DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          VM1_PRIVATE_IP=${{ secrets.VM1_PRIVATE_IP }}
          VM2_PRIVATE_IP=${{ secrets.VM2_PRIVATE_IP }}
          VM3_PRIVATE_IP=${{ secrets.VM3_PRIVATE_IP }}
          VM4_PRIVATE_IP=${{ secrets.VM4_PRIVATE_IP }}
          VM5_PRIVATE_IP=${{ secrets.VM5_PRIVATE_IP }}
          VM_PUBLIC_IP=${{ secrets.VM_PUBLIC_IP }}
          EOF
          sed -i -e '/^MONITORING_TAG=/d' -e '/^STATIC_TAG=/d' .env.tags 2>/dev/null || touch .env.tags
          printf "MONITORING_TAG=v${{ github.run_number }}\nSTATIC_TAG=latest\n" >> .env.tags
          cat .env.tags >> .env
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker compose -f docker-compose.worker.yml pull cadvisor node-exporter
          docker compose -f docker-compose.worker.yml up -d --force-recreate cadvisor node-exporter
          docker image prune -af --filter "until=24h"


