name: Deploy Frontend

on:
  push:
    branches: ["main"]
    paths:
      - 'FE-Todo/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - '.github/workflows/frontend.yml'

jobs:
  build-frontend:
    uses: ./.github/workflows/build-and-push.yml
    with:
      build_mode: 'compose'
      compose_file: 'docker-compose.yml'
      service: 'frontend'
    secrets: inherit

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend

    strategy:
      matrix:
        include:
          - name: vm1
            host: VM1_HOST
            key: VM1_SSH_KEY
            env: ENV_FILE_VM
            private_ip: VM1_PRIVATE_IP
          - name: vm5
            host: VM5_HOST
            key: VM5_SSH_KEY
            env: ENV_FILE_VM
            private_ip: VM5_PRIVATE_IP

    steps:
      - uses: actions/checkout@v4

      - name: Copy files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets[matrix.host] }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets[matrix.key] }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml,nginx/"
          target: "~/project/Todo_App"

      - name: Deploy ${{ matrix.name }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets[matrix.host] }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets[matrix.key] }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/project/Todo_App
            echo "------------------------------------------------------------"
            echo "Deployment Info:"
            echo "  VM Name: ${{ matrix.name }}"
            echo "  Target IP (Secret Name): ${{ matrix.private_ip }}"
            echo "  Host IP: $(hostname -I | awk '{print $1}')"
            echo "------------------------------------------------------------"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            cat << 'EOF' | sed 's/^[[:space:]]*//' > .env
            ${{ secrets[matrix.env] }}
            BIND_IP=${{ secrets[matrix.private_ip] }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            EOF
            
            sed -i -e '/^FRONTEND_TAG=/d' -e '/^STATIC_TAG=/d' .env.tags 2>/dev/null || touch .env.tags
            printf "FRONTEND_TAG=v${{ github.run_number }}\nSTATIC_TAG=latest\n" >> .env.tags
            cat .env.tags >> .env

            docker compose pull frontend
            docker compose up -d --force-recreate frontend

            docker image prune -af --filter "until=24h"
