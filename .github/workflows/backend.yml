name: Deploy Backend

on:
  push:
    branches: ["main"]
    paths:
      - 'BE-Todo/**'
      - 'docker-compose.worker.yml'
      - '.github/workflows/backend.yml'

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for build
        run: |
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
          echo "BACKEND_TAG=v${{ github.run_number }}" >> .env
          echo "MONITORING_TAG=latest" >> .env

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        run: |
          docker compose -f docker-compose.worker.yml build --no-cache backend
          docker compose -f docker-compose.worker.yml push backend

  deploy-backend:
    needs: build-backend
    strategy:
      matrix:
        include:
          - vm: vm2
            runs_on: '["self-hosted","linux","vm2"]'
            env: ENV_FILE_VM
            private_ip: VM2_PRIVATE_IP
          - vm: vm3
            runs_on: '["self-hosted","linux","vm3"]'
            env: ENV_FILE_VM
            private_ip: VM3_PRIVATE_IP

    runs-on: ${{ fromJson(matrix.runs_on) }}
    steps:
      - uses: actions/checkout@v4

      - name: Update project source
        run: |
          cd ~/project/Todo_App
          git fetch --all
          git reset --hard origin/main
          
      - name: Create .env
        run: |
          cat << 'ENVEOF' > ~/project/Todo_App/.env
          ${{ secrets[matrix.env] }}
          ENVEOF
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> ~/project/Todo_App/.env
          echo "BIND_IP=${{ secrets[matrix.private_ip] }}" >> ~/project/Todo_App/.env
          
          touch ~/project/Todo_App/.env.tags
          sed -i '/^BACKEND_TAG=/d' ~/project/Todo_App/.env.tags
          echo "BACKEND_TAG=v${{ github.run_number }}" >> ~/project/Todo_App/.env.tags
          cat ~/project/Todo_App/.env.tags >> ~/project/Todo_App/.env

      - name: Deploy ${{ matrix.vm }}
        run: |
          cd ~/project/Todo_App
          echo "------------------------------------------------------------"
          echo "Deployment Info:"
          echo "  VM Name: ${{ matrix.vm }}"
          echo "  Target IP (Secret Name): ${{ matrix.private_ip }}"
          echo "  Host IP: $(hostname -I | awk '{print $1}')"
          echo "------------------------------------------------------------"
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          docker compose -f docker-compose.worker.yml down backend
          docker compose -f docker-compose.worker.yml pull backend
          docker compose -f docker-compose.worker.yml up -d --force-recreate backend

          docker image prune -af --filter "until=24h"
