name: Reusable Build and Push

on:
  workflow_call:
    inputs:
      build_mode:
        required: true
        type: string
      compose_file:
        required: false
        type: string
      service:
        required: false
        type: string
      docker_context:
        required: false
        type: string
      image_name:
        required: false
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=v${{ github.run_number }}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push (docker compose)
        if: ${{ inputs.build_mode == 'compose' }}
        run: |
          docker compose -f ${{ inputs.compose_file }} build --no-cache ${{ inputs.service }}
          docker compose -f ${{ inputs.compose_file }} push ${{ inputs.service }}

      - name: Build & Push (docker build)
        if: ${{ inputs.build_mode == 'docker' }}
        run: |
          docker build -t ${{ inputs.image_name }}:${{ env.IMAGE_TAG }} ${{ inputs.docker_context }}
          docker push ${{ inputs.image_name }}:${{ env.IMAGE_TAG }}
