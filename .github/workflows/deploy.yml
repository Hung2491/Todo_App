name: CI/CD Docker Deploy

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Đăng nhập vào Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build và đẩy Image lên Hub (Cực nhanh nhờ cơ chế Layer)
      - name: Build and Push Docker Images
        run: |
          docker compose build
          docker compose push

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # BƯỚC QUAN TRỌNG: Tạo file .env từ GitHub Secret để SCP có file mà bốc đi
      - name: Create .env file from Secrets
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      # Bắn file config và file .env vừa tạo sang Server
      - name: Copy configs to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          # Source bốc file .env vừa tạo ở trên cùng với các folder config
          source: "docker-compose.yml,.env,nginx/,monitoring/"
          target: "~/project/Todo_App"

      # SSH vào server để ra lệnh cho Docker "thay máu"
      - name: Docker Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/project/Todo_App
            
            # Đăng nhập để Pull được image từ Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Kéo bản mới nhất và khởi động lại
            docker compose pull
            docker compose up -d --force-recreate
            
            # Dọn dẹp Image cũ để không đầy ổ cứng VPS
            docker image prune -f
