name: CI/CD Docker Deploy

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Tự động build lại TẤT CẢ image (FE + BE) dựa theo docker-compose.yml
      - name: Build Docker Images via Compose
        run: docker compose build

      # 2. Đóng gói cả 2 Image thành 1 file tar duy nhất
      - name: Save Docker Images
        run: docker save todo-app-frontend:latest todo-app-backend:latest > images.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: images.tar
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      # 3. Tạo file .env cho BE thông qua Secret của Github để bảo mật tuyệt đối
      - name: Create Backend Environment File
        run: |
          mkdir -p BE-Todo
          echo "${{ secrets.ENV_FILE }}" > BE-Todo/.env

      # 4. Bắn toàn bộ file config và Image lên Server
      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          # Lấy tất cả thư mục cần thiết
          source: "images.tar,docker-compose.yml,BE-Todo/.env,nginx,monitoring"
          target: "~/project/Todo-App"

      # 5. SSH vào Server để thực thi Docker chạy
      - name: Docker Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/project/Todo-App
            
            # Load lại các image mới nhất vừa copy từ Github Actions sang
            docker load < images.tar
            
            rm images.tar # Xóa ngay sau khi load
            
            # Chạy toàn bộ hệ thống (dùng lại image đã load, không build lại trên VPS để tiết kiệm RAM)
            docker compose up -d
            
            # Dọn dẹp image thừa/cũ
            docker image prune -f
