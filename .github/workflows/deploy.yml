name: CI/CD Docker Deploy

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Đăng nhập để đẩy Image lên chợ (Docker Hub)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tự động build và push trực tiếp lên Hub (Không nén file .tar nữa)
      - name: Build and Push Docker Images
        run: |
          docker compose build
          docker compose push

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Chỉ copy các file cấu hình nhẹ sang server (Bỏ images.tar)
      - name: Copy configs to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml,nginx/,monitoring/,BE-Todo/.env.example" # Không copy .env thật nếu muốn bảo mật
          target: "~/project/Todo-App"

      # SSH vào server để ra lệnh update
      - name: Docker Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/project/Todo-App
            # Đăng nhập để có quyền kéo image (nếu là repo private)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Kéo bản mới nhất từ Docker Hub về (Chỉ tải phần thay đổi)
            docker compose pull
            
            # Restart hệ thống với code mới nhất
            docker compose up -d --force-recreate
            
            # Dọn dẹp các bản build cũ để tránh đầy ổ cứng VPS
            docker image prune -f
